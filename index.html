<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8/3 Memory Vault - For Our Girls</title>
    <style>
        :root { --pink: #ff85a1; --dark-pink: #f75c7e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff5f7; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        h1 { color: var(---dark-pink); margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 100px); gap: 10px; margin-top: 20px; }
        .card { width: 100px; height: 100px; background: var(--pink); border-radius: 8px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        .card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2em; }
        .card-front { background: var(--pink); color: white; }
        .card-back { background: white; transform: rotateY(180deg); border: 2px solid var(--pink); }
        .card-back img { width: 80%; height: 80%; object-fit: contain; }
        #message { margin-top: 20px; font-weight: bold; color: var(--dark-pink); font-size: 1.2em; display: none; text-align: center; }
    </style>
</head>
<body>
    <h1>🌸 THE MEMORY VAULT 🌸</h1>
    <p>Tìm các cặp hình giống nhau để mở khóa quà 8/3 nhé!</p>
    
    <div class="grid" id="gameGrid"></div>
    <div id="message">✨ CHÚC MỪNG CÁC CÔ GÁI! ✨<br>Hãy chụp màn hình này để nhận bánh từ các bạn nam nhé! 🍰</div>

    <script>
        // Danh sách các icon hoặc đường dẫn ảnh (Thay bằng link ảnh của bạn tại đây)
        const cardIcons = ['🎁', '🍰', '💖', '⭐', '🎓', '📚']; 
        let cards = [...cardIcons, ...cardIcons];
        let flippedCards = [];
        let matchedCount = 0;

        // Xáo trộn bài
        cards.sort(() => 0.5 - Math.random());

        const grid = document.getElementById('gameGrid');
        cards.forEach((icon, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.icon = icon;
            card.innerHTML = `
                <div class="card-front">?</div>
                <div class="card-back">${icon}</div>
            `;
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });

        function flipCard() {
            if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
                this.classList.add('flipped');
                flippedCards.push(this);

                if (flippedCards.length === 2) {
                    setTimeout(checkMatch, 700);
                }
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.icon === card2.dataset.icon) {
                matchedCount++;
                if (matchedCount === cardIcons.length) {
                    document.getElementById('message').style.display = 'block';
                }
            } else {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
            }
            flippedCards = [];
        }
    </script>
</body>
</html>
